server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:8084"
              - "http://localhost:8080"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: flight-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/flights/**
        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/bookings/**
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**