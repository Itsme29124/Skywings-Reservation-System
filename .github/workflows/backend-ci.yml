name: backend-ci

on:
  push:
    paths: ["backend/**"]
  pull_request:
    paths: ["backend/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, user-service, flight-service, booking-service, payment-service, notification-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build ${{ matrix.service }}
        working-directory: backend/${{ matrix.service }}
        run: mvn -B package --file pom.xml
      # - name: Build & push Docker image
      #   run: |
      #     docker build -t ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }} backend/${{ matrix.service }}
      #     docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
